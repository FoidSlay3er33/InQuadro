<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InQuadro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SCHERMATE -->
<div class="screen active" id="home">
    <img src="image.jpeg" alt="none" height="100px">
    <p>
        <h2>Inquadro<br> Guarda. Capisci.</h2>
        InQuadro permette alle aziende di fornire tutorial e informazioni
        tramite QR code collegati a contenuti video o audio.
    </p>
</div>

<div class="screen" id="video">
    <img src="image.jpeg" alt="none" height="100px">
    <h2>Come funziona</h2>
    <p>Scansiona il QR code e accedi subito al contenuto.</p>

    <div class="video-container">
        <iframe src="video.mp4"
        frameborder="0" allowfullscreen></iframe>
    </div>
    <div class="video-container">
        <iframe src="video1.mp4"
        frameborder="0" allowfullscreen></iframe>
    </div>
    <div class="video-container">
        <iframe src="video2.mp4"
        frameborder="0" allowfullscreen></iframe>
    </div>
</div>

<div class="screen" id="contatti">
    <img src="image.jpeg" alt="none" height="100px">
    <h2>Contattaci</h2>
    <form id="contact-form">
        <input type="text" placeholder="Nome azienda" required>
        <input type="email" placeholder="Email" required>
        <textarea placeholder="Messaggio" required></textarea>
        <button type="submit">Invia</button>
    </form>
</div>

<!-- NAVBAR BOTTOM -->
<div class="bottom-nav">
    <button onclick="showScreen('home')" class="active">
        <span>🏠</span>
        <small>Home</small>
    </button>

    <button onclick="showScreen('video')">
        <span>▶️</span>
        <small>Video</small>
    </button>

    <button onclick="showScreen('contatti')">
        <span>✉️</span>
        <small>Contatti</small>
    </button>
</div>

<script src="script.js"></script>
</body>
</html>
